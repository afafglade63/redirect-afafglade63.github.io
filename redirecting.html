<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesltra Redirecting</title>

  <style>
    :root {
      --accent: #FFD000;
    }

    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f0f0f0;
      color: #222;
    }

    .loader-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      z-index: 9999;
    }

    .loader {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 5px solid rgba(75, 0, 170, 0.15);
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

</head>
<body>

  <div class="loader-container">
    <div class="loader"></div>
  </div>

  <script>
    setTimeout(() => {
      window.location.replace('https://qrco.de/bgtLeq');
    }, 3000);
  </script>

</body>
</html>
